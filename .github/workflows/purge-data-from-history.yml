name: Purge Data Folder from Git History

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out full repository history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Remove Data/ folder from all history
        run: |
          git-filter-repo --path Data/ --invert-paths --force

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Re-add remote and force-push all branches
        run: |
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force --all origin
          git push --force --tags origin
