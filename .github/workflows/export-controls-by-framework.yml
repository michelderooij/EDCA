name: Export Controls by Framework

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - Config/controls.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-controls:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Validate controls.json and export framework files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $controlsPath = 'Config/controls.json'
          $outputDir = 'Controls'
          $frameworks = @(
            'ANSSI',
            'BSI',
            'CIS',
            'CISA',
            'DISA',
            'DPIA',
            'ENISA',
            'Best Practice'
          )

          $controls = Get-Content -Raw -Path $controlsPath | ConvertFrom-Json

          New-Item -Path $outputDir -ItemType Directory -Force | Out-Null

          foreach ($framework in $frameworks) {
            $safeName = $framework -replace '\s+', ''
            $outputPath = Join-Path $outputDir "controls-$safeName.json"

            $filtered = @(
              $controls | Where-Object {
                $_.frameworks -is [System.Collections.IEnumerable] -and
                $_.frameworks -contains $framework
              }
            )

            $filtered | ConvertTo-Json -Depth 100 -AsArray | Set-Content -Path $outputPath -Encoding UTF8
            Write-Host "Wrote $($filtered.Count) controls to $outputPath"
          }

      - name: Commit and push exported controls if changed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "Pull request comes from a fork; skipping commit because this workflow cannot push to fork branches."
            exit 0
          fi

          if git diff --quiet -- Controls/; then
            echo "No controls export changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Controls/controls-*.json
          git commit -m "Update framework control exports"

          branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          git push origin "HEAD:${branch}"
